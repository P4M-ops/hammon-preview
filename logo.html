<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logo-Varianten &ndash; Hammon Architektur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    color: #f2efea;
    font-family: Inter, system-ui, sans-serif;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 64px;
  }
  @keyframes up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #808080;
    text-decoration: none;
    align-self: flex-start;
    margin-bottom: -32px;
    transition: color .3s;
    animation: up .7s cubic-bezier(0.16, 1, 0.3, 1) .3s both;
  }
  .back-link:hover { color: #c08040; }
  .back-link svg { width: 16px; height: 16px; }
  h1 { font-size: 16px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: #c08040; }
  h2 { font-size: 12px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 16px; text-align: center; }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 1100px;
  }
  .frame {
    padding: 48px 64px;
    border: 1px solid #222;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dark { background: #0e0e0e; }
  .cream { background: #faf8f5; }
  .frame img { max-width: 100%; height: auto; }
  .divider {
    width: 120px;
    height: 1px;
    background: #333;
  }
  .row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
  }
  .row .card { max-width: 520px; }
  .row .frame { padding: 32px 40px; }
  .small-row {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
  }
  .small-row .card { max-width: 340px; }
  .small-row .frame { padding: 20px 24px; }
  .small-row .frame img { max-width: 280px; }
  @media (max-width: 700px) {
    body { padding: 40px 20px; gap: 48px; }
    .frame { padding: 32px 24px; }
    .row { gap: 24px; }
  }
</style>
</head>
<body>

<a href="index.html" class="back-link">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  Zur&uuml;ck zur &Uuml;bersicht
</a>

  </div>
</div>

<div class="divider"></div>

<div class="divider"></div>

      <img src="assets/Hammon-Architektur-Logo-V1-white.png" alt="Logo V1 klein">
    </div>
  </div>
  <div class="card">
    <h2>V2 klein</h2>
    <div class="frame dark">
      <img src="assets/Hammon-Architektur-Logo-V2-white.png" alt="Logo V2 klein">
    </div>
  </div>
  <div class="card">
    <h2>V3 klein</h2>
    <div class="frame dark">
      <img src="assets/Hammon-Architektur-Logo-V3-white.png" alt="Logo V3 klein">
    </div>
  </div>
</div>

</body>
</html>
