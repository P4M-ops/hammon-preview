<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e0e0e;
    color: #f2efea;
    font-family: Inter, system-ui, sans-serif;
    padding: 60px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 64px;
  }
  @keyframes up {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #808080;
    text-decoration: none;
    align-self: flex-start;
    margin-bottom: -32px;
    transition: color .3s;
    animation: up .7s cubic-bezier(0.16, 1, 0.3, 1) .3s both;
  }
  .back-link:hover { color: #c08040; }
  .back-link svg { width: 16px; height: 16px; }
  h1 { font-size: 16px; font-weight: 300; letter-spacing: 0.2em; text-transform: uppercase; color: #c08040; }
  h2 { font-size: 12px; font-weight: 400; letter-spacing: 0.15em; text-transform: uppercase; color: #888; margin-bottom: 16px; text-align: center; }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    width: 100%;
    max-width: 1100px;
  }
  .frame {
    padding: 56px 72px;
    border: 1px solid #222;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dark { background: #0e0e0e; }
  .cream { background: #faf8f5; }
  svg { max-width: 100%; height: auto; }
  .divider {
    width: 120px;
    height: 1px;
    background: #333;
  }
  .row {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
  }
  .row .card { max-width: 520px; }
  .row .frame { padding: 32px 40px; }
</style>
